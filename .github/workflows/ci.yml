name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Build · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Codegen check (no hand-edited generated files)
        run: npm run codegen:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: wynaxa
          SENTRY_PROJECT: javascript-react

      - name: Lint
        run: npm run lint
        continue-on-error: true

  drift:
    name: Cross-runtime drift test (SQL vs TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply generated classify_set_sql migration
        run: psql "$PPA_DB_URL" -f supabase/migrations/20260626000003_classify_set_sql.generated.sql
        env:
          PPA_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Run drift test
        run: node scripts/codegen/drift-test.ts
        env:
          PPA_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
          PSQL_BIN: /usr/bin/psql
