<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Title and basic meta -->
    <title>Padel Players — Your padel community</title>
    <meta name="description" content="Organise padel matches, track rankings, run leagues. Built for social padel players. Find players, book courts, record results." />

    <!-- Theme color and color scheme -->
    <meta name="theme-color" content="#009688" />
    <meta name="color-scheme" content="light" />

    <!-- Cache control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Apple PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Padel Players" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />

    <!-- Safari mask icon -->
    <link rel="mask-icon" href="/favicon.svg" color="#009688" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Padel Players" />
    <meta property="og:title" content="Padel Players — Your padel community" />
    <meta property="og:description" content="Organise padel matches, track rankings, run leagues. Built for social padel players." />
    <meta property="og:url" content="https://www.padelplayersapp.com/" />
    <meta property="og:image" content="https://www.padelplayersapp.com/icons/icon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Padel Players — Your padel community" />
    <meta name="twitter:description" content="Organise padel matches, track rankings, run leagues." />
    <meta name="twitter:image" content="https://www.padelplayersapp.com/icons/icon-512x512.png" />

    <!-- Author / Application -->
    <meta name="author" content="Wynaxa Sports Tech Ltd" />
    <meta name="application-name" content="Padel Players" />
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
